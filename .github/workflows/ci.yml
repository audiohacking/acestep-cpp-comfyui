name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Fast validation: Python syntax + linting + pytest + JSON well-formedness
  # -------------------------------------------------------------------------
  validate:
    name: Validate code and workflow JSONs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pyflakes

      - name: Check Python syntax
        run: python -m py_compile nodes.py __init__.py install.py

      - name: Lint Python
        run: python -m pyflakes nodes.py __init__.py install.py

      - name: Run unit tests
        run: python -m pytest tests/ -v

      - name: Validate workflow JSON files
        run: |
          for f in workflow-examples/*.json; do
            python -m json.tool "$f" > /dev/null \
              && echo "✓ $f" \
              || (echo "✗ $f" && exit 1)
          done

  # -------------------------------------------------------------------------
  # Build test: clone acestep.cpp and compile the C++ binaries via install.py
  # Tests the automatic build that ComfyUI Manager triggers on node install.
  # Runs on every push to main, every PR, and on manual workflow_dispatch.
  # -------------------------------------------------------------------------
  build-test:
    name: Build acestep.cpp binaries (install.py)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake build-essential

      - name: Run install.py (clone + cmake build)
        run: python install.py

      - name: Verify binaries exist
        run: |
          for bin in ace-qwen3 dit-vae; do
            # install.py passes -DCMAKE_RUNTIME_OUTPUT_DIRECTORY so binaries
            # land in build/ directly; also check build/bin/ as a fallback for
            # any build done without that flag (mirrors _binary_in_build logic).
            if test -f "acestep.cpp/build/$bin"; then
              echo "✓ $bin (build/)"
            elif test -f "acestep.cpp/build/bin/$bin"; then
              echo "✓ $bin (build/bin/)"
            else
              echo "✗ $bin not found in build/ or build/bin/" && exit 1
            fi
          done

